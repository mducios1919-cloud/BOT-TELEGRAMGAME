services:
  - type: web
    name: zefoy-api
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 60 --graceful-timeout 30"
    envVars:
      - key: ADMIN_TOKEN
        generateValue: true
      - key: MAX_SESSIONS
        value: "15"
      - key: SESSION_TTL
        value: "1800"
      - key: PYTHON_VERSION
        value: "3.11.9"
