services:
  - type: web
    name: tienbuff-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASS
        value: admin123
      - key: JWT_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /tmp/tienbuff_data
