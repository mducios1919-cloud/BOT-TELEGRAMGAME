services:
  - type: web
    name: zefoy-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --timeout 120 --workers 2
    envVars:
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: zefoy2026
      - key: SECRET_KEY
        generateValue: true
    healthCheckPath: /api/status
